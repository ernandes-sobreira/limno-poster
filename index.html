<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avaliação de Pôsteres — XX Congresso Brasileiro de Limnologia</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --azul:#1B75BB;--azul-esc:#125088;--verde:#2E9E5B;--amarelo:#F2A900;
    --cinza:#f4f6f9;--borda:#dde3ea;--texto:#1f2a37;--suave:#6b7684;
    --sombra:0 1px 3px rgba(16,40,70,.08),0 1px 2px rgba(16,40,70,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--cinza);color:var(--texto);line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1080px;margin:0 auto;padding:0 16px}
  header{background:linear-gradient(135deg,var(--azul) 0%,var(--azul-esc) 100%);color:#fff;padding:22px 0}
  header .wrap{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  header .logo{background:#fff;padding:9px 14px;border-radius:10px;display:flex;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,.12)}
  header h1{font-size:19px;font-weight:700}
  header p{font-size:13px;opacity:.9;margin-top:2px}
  .card{background:#fff;border:1px solid var(--borda);border-radius:12px;box-shadow:var(--sombra);padding:24px;margin:20px 0}
  h2{font-size:17px;margin-bottom:16px;color:var(--azul-esc)}
  label{display:block;font-size:13px;font-weight:600;color:var(--suave);margin-bottom:6px;margin-top:14px}
  label:first-of-type{margin-top:0}
  input,select,textarea{width:100%;padding:11px 13px;border:1px solid var(--borda);border-radius:8px;
    font-size:15px;font-family:inherit;background:#fff;color:var(--texto)}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--azul);box-shadow:0 0 0 3px rgba(27,117,187,.12)}
  textarea{resize:vertical;min-height:64px}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--azul);
    color:#fff;border:none;padding:12px 22px;border-radius:8px;font-size:15px;font-weight:600;
    cursor:pointer;transition:background .15s;font-family:inherit}
  .btn:hover{background:var(--azul-esc)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn-verde{background:var(--verde)}.btn-verde:hover{background:#247a46}
  .btn-sec{background:#fff;color:var(--azul);border:1px solid var(--azul)}.btn-sec:hover{background:#eef5fb}
  .hide{display:none!important}
  .msg{padding:11px 14px;border-radius:8px;font-size:13px;margin-top:14px}
  .msg-err{background:#fdecec;color:#b3261e;border:1px solid #f5c2c0}
  .msg-ok{background:#e7f6ec;color:#1c7c3f;border:1px solid #b6e0c4}
  .msg-info{background:#fff6e0;color:#8a6100;border:1px solid #f3d98a}
  .poster{border:1px solid var(--borda);border-radius:10px;margin-bottom:14px;overflow:hidden}
  .poster-head{background:var(--cinza);padding:14px 16px;cursor:pointer;display:flex;align-items:flex-start;gap:12px;transition:background .15s}
  .poster-head:hover{background:#eef2f7}
  .pid{background:var(--azul);color:#fff;font-weight:700;font-size:13px;padding:3px 9px;border-radius:6px;white-space:nowrap;flex-shrink:0}
  .pid.done{background:var(--verde)}
  .ptitle{font-size:14px;font-weight:600;flex:1}
  .pmeta{font-size:12px;color:var(--suave);margin-top:3px;font-weight:400}
  .pstatus{font-size:12px;font-weight:600;color:var(--verde);white-space:nowrap;flex-shrink:0}
  .poster-body{padding:18px 16px;border-top:1px solid var(--borda)}
  .autores-full{font-size:12px;color:var(--texto);margin-bottom:14px;background:#f8fafc;padding:10px 12px;border-radius:8px;border:1px solid var(--borda)}
  .autores-full b{color:var(--azul-esc)}
  .crit-row{display:flex;align-items:center;gap:14px;padding:9px 0;border-bottom:1px solid #f0f2f5}
  .crit-name{flex:1;font-size:14px;font-weight:500}
  .nota-sel{width:78px;flex-shrink:0}
  .media-box{background:#eef5fb;border-radius:8px;padding:12px 16px;margin-top:14px;display:flex;justify-content:space-between;align-items:center}
  .media-val{font-size:22px;font-weight:800;color:var(--azul-esc)}
  .progresso{font-size:13px;color:var(--suave);margin:6px 0 16px}
  .barra{height:8px;background:var(--borda);border-radius:4px;overflow:hidden;margin-top:6px}
  .barra-fill{height:100%;background:var(--verde);transition:width .3s}
  .topbar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
  .badge{background:#eef5fb;color:var(--azul-esc);font-size:13px;font-weight:600;padding:6px 12px;border-radius:20px}
  .badge-dia{background:var(--amarelo);color:#fff}
  .fb-warn{background:#fff6e0;border:1px solid #f3d98a;border-radius:8px;padding:12px 14px;font-size:12px;color:#8a6100;margin-bottom:16px}
  .ajuda{background:#eef5fb;border:1px solid #cfe3f3;border-radius:10px;padding:16px 18px;margin-top:16px;font-size:13px;line-height:1.6}
  .ajuda h3{font-size:14px;color:var(--azul-esc);margin-bottom:8px}
  .ajuda ol{margin:0 0 0 18px}.ajuda li{margin-bottom:6px}
  .ajuda .destaque{background:#fff6e0;border-left:3px solid var(--amarelo);padding:8px 12px;border-radius:6px;margin-top:10px;color:#8a6100}
  .link-ajuda{color:var(--azul);font-size:13px;cursor:pointer;background:none;border:none;text-decoration:underline;font-family:inherit;padding:0;margin-top:8px}
  footer{text-align:center;padding:24px;font-size:12px;color:var(--suave)}
</style>
</head>

const NOMES_DIAS = {"21":"21 de julho","22":"22 de julho","23":"23 de julho"};

// --- Firebase ---
let db=null, fbOk=false;
try{
  if(firebaseConfig.apiKey && firebaseConfig.apiKey!=="COLE_AQUI"){
    firebase.initializeApp(firebaseConfig); db=firebase.firestore(); fbOk=true;
  }
}catch(e){ console.error(e); fbOk=false; }

// --- estado ---
let diaAtual="", avaliadorAtual="", emailAtual="", notas={}, saveTimer=null, statusRestaurado="";

const $=id=>document.getElementById(id);
function msg(el,txt,tipo){ el.innerHTML='<div class="msg msg-'+tipo+'">'+txt+'</div>'; }
function limpaMsg(el){ el.innerHTML=''; }
function keyPoster(p){ return "p"+p.idPoster+"_"+p.idOriginal; }
function esc(s){ return (s||"").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function slug(s){ return s.trim().replace(/\s+/g,"_"); }

// --- AUTOSAVE (por dia + avaliador) ---
function docKey(){ return slug(avaliadorAtual)+"__dia"+diaAtual; }
function lsKey(){ return "cbl_"+docKey(); }

function salvarLocal(){
  try{ localStorage.setItem(lsKey(), JSON.stringify({dia:diaAtual,avaliador:avaliadorAtual,email:emailAtual,notas:notas,atualizadoEm:new Date().toISOString()})); }
  catch(e){ console.error(e); }
}
async function salvarNuvem(){
  if(!fbOk) return;
  try{
    await db.collection("rascunhos").doc(docKey()).set({
      dia:diaAtual, avaliador:avaliadorAtual.trim(), email:emailAtual, notas:notas,
      atualizadoEm:firebase.firestore.FieldValue.serverTimestamp()
    },{merge:true});
    marcaSalvo("nuvem");
  }catch(e){ console.error(e); marcaSalvo("local"); }
}
function autosave(){
  salvarLocal(); marcaSalvo(fbOk?"salvando":"local");
  if(saveTimer) clearTimeout(saveTimer);
  saveTimer=setTimeout(salvarNuvem,1500);
}
function marcaSalvo(estado){
  const el=$("save-status"); if(!el) return;
  const map={"salvando":["● salvando na nuvem...","#8a6100"],"nuvem":["✓ salvo na nuvem","#1c7c3f"],"local":["✓ salvo neste aparelho","#125088"]};
  const [txt,cor]=map[estado]||["",""]; el.textContent=txt; el.style.color=cor;
}
async function carregarRascunho(){
  let dados=null;
  if(fbOk){
    try{ const doc=await db.collection("rascunhos").doc(docKey()).get(); if(doc.exists) dados=doc.data(); }
    catch(e){ console.error(e); }
  }
  if(!dados){ try{ const raw=localStorage.getItem(lsKey()); if(raw) dados=JSON.parse(raw); }catch(e){} }
  if(dados && dados.notas){
    notas=dados.notas;
    if(dados.email && !emailAtual) emailAtual=dados.email;
    statusRestaurado="Rascunho anterior recuperado. Continue de onde parou.";
  }
}

// --- preencher seletor de dias (só dias com dados) ---
const selDia=$("in-dia");
Object.keys(DIAS).sort().forEach(dia=>{
  if(DIAS[dia] && Object.keys(DIAS[dia]).length){
    const o=document.createElement("option"); o.value=dia; o.textContent=NOMES_DIAS[dia]||("Dia "+dia); selDia.appendChild(o);
  }
});

// ao escolher dia, preenche avaliadores daquele dia
selDia.onchange=()=>{
  const dia=selDia.value, selAv=$("in-avaliador");
  selAv.innerHTML='<option value="">Selecione seu nome...</option>';
  if(!dia){ selAv.disabled=true; selAv.innerHTML='<option value="">Primeiro selecione o dia</option>'; return; }
  selAv.disabled=false;
  Object.keys(DIAS[dia]).sort().forEach(nome=>{
    const o=document.createElement("option"); o.value=nome; o.textContent=nome; selAv.appendChild(o);
  });
};

// aviso firebase
if(!fbOk){
  const s=$("fb-status"); s.classList.remove("hide");
  s.innerHTML="⚠ Firebase não configurado. As notas são salvas neste aparelho, mas o envio à coordenação só funciona após configurar o Firebase.";
}

// ---------- AJUDA ----------
const textoAjuda = `
<h3>Como usar o aplicativo</h3>
<ol>
  <li>Selecione o <b>dia</b> em que você vai avaliar.</li>
  <li>Selecione o <b>seu nome</b> na lista. Aparecerão apenas os pôsteres que são seus para avaliar naquele dia.</li>
  <li>Digite o <b>seu e-mail</b> e a senha do congresso, e toque em <b>Entrar</b>.</li>

  <li>Dê uma nota de <b>1 a 10</b> em cada um dos oito critérios. A média é calculada sozinha.</li>
  <li>Ao terminar, toque em <b>Enviar avaliações à coordenação</b>.</li>
</ol>
<div class="destaque"><b>Importante:</b> use sempre o <b>mesmo e-mail</b> para entrar no sistema. É por ele que suas avaliações são reconhecidas. Se entrar com um e-mail diferente, o sistema não vai reconhecer o que você já preencheu.</div>
<div class="destaque"><b>Não compartilhe a senha</b> do congresso com ninguém. Ela é de uso exclusivo dos avaliadores.</div>
<div class="destaque">Se você fechar a página, desligar o celular ou perder a conexão, <b>não se preocupe</b>: suas notas ficam salvas. Basta reabrir, escolher o mesmo dia e o mesmo nome, que elas voltam.</div>
`;
$("ajuda-login").innerHTML=textoAjuda;
$("btn-ajuda-login").onclick=()=>{
  const a=$("ajuda-login"); const abrir=a.classList.contains("hide");
  a.classList.toggle("hide"); $("btn-ajuda-login").textContent=abrir?"Ocultar ajuda":"Como usar o aplicativo?";
};

// ---------- LOGIN ----------
$("btn-entrar").onclick=async()=>{
  limpaMsg($("login-msg"));
  const dia=selDia.value, nome=$("in-avaliador").value, email=$("in-email").value.trim(), senha=$("in-senha").value;
  if(!dia){ msg($("login-msg"),"Selecione o dia da avaliação.","err"); return; }
  if(!nome){ msg($("login-msg"),"Selecione seu nome.","err"); return; }
  if(!email || !/^[^@]+@[^@]+\.[^@]+$/.test(email)){ msg($("login-msg"),"Informe um e-mail válido.","err"); return; }
  if(senha!==SENHA_CONGRESSO){ msg($("login-msg"),"Senha do congresso incorreta.","err"); return; }
  diaAtual=dia; avaliadorAtual=nome; emailAtual=email;
  const btn=$("btn-entrar"); btn.disabled=true; btn.textContent="Carregando...";
  await abrirPainel();
  btn.disabled=false; btn.textContent="Entrar";
};

async function abrirPainel(){
  const lista=(DIAS[diaAtual]||{})[avaliadorAtual]||[];
  notas={};
  await carregarRascunho();
  lista.forEach(p=>{ const k=keyPoster(p); notas[k]=notas[k]||{criterios:{},obs:""}; });
  $("tela-login").classList.add("hide");
  $("tela-painel").classList.remove("hide");
  $("lbl-nome").textContent=avaliadorAtual.trim();
  $("lbl-data").textContent="Data: "+new Date().toLocaleDateString("pt-BR");
  $("lbl-dia").textContent=NOMES_DIAS[diaAtual]||("Dia "+diaAtual);
  $("lbl-count").textContent=lista.length+" pôsteres";
  renderPosters(lista);
  lista.forEach(p=>{ const k=keyPoster(p); calcMedia(k); atualizaStatus(k); });
  atualizaProgresso();
  if(statusRestaurado){ msg($("painel-msg"),statusRestaurado,"info"); statusRestaurado=""; }
}

// ---------- RENDER ----------
function renderPosters(lista){
  const cont=$("lista-posters"); cont.innerHTML="";
  lista.forEach(p=>{
    const k=keyPoster(p);
    notas[k]=notas[k]||{criterios:{},obs:""};
    const div=document.createElement("div"); div.className="poster";
    const autoresResumo=p.autores.length?p.autores[0]+(p.autores.length>1?" et al.":""):"";
    div.innerHTML=`
      <div class="poster-head" data-k="${k}">
        <span class="pid" id="pid-${k}">#${esc(p.idPoster)}</span>
        <div style="flex:1">
          <div class="ptitle">${esc(p.titulo)}</div>
          <div class="pmeta">${esc(autoresResumo)}${p.instituicao?" · "+esc(p.instituicao):""}</div>
        </div>
        <span class="pstatus" id="st-${k}"></span>
      </div>
      <div class="poster-body hide" id="body-${k}"></div>`;
    cont.appendChild(div);
    div.querySelector(".poster-head").onclick=()=>toggleBody(k,p);
  });
}

function toggleBody(k,p){
  const body=$("body-"+k);
  if(!body.classList.contains("hide")){ body.classList.add("hide"); return; }
  if(!body.dataset.built){
    let h="";
    // bloco de autores completo
    if(p.autores.length){
      h+='<div class="autores-full"><b>Autores:</b> '+p.autores.map(esc).join("; ");
      if(p.instituicao) h+='<br><b>Instituição:</b> '+esc(p.instituicao);
      h+='<br><b>ID original do trabalho:</b> '+esc(p.idOriginal)+'</div>';
    }
    CRITERIOS.forEach(([id,nome])=>{
      let opts='<option value="">—</option>';
      for(let i=1;i<=10;i++) opts+=`<option value="${i}">${i}</option>`;
      h+=`<div class="crit-row"><div class="crit-name">${nome}</div><select class="nota-sel" data-k="${k}" data-c="${id}">${opts}</select></div>`;
    });
    h+=`<label>Observações</label><textarea data-k="${k}" placeholder="Comentários (opcional)"></textarea>`;
    h+=`<div class="media-box"><span style="font-size:13px;color:var(--suave);font-weight:600">Média deste pôster</span><span class="media-val" id="media-${k}">—</span></div>`;
    body.innerHTML=h; body.dataset.built="1";
    body.querySelectorAll("select.nota-sel").forEach(s=>{
      s.onchange=e=>{
        const kk=e.target.dataset.k, c=e.target.dataset.c;
        notas[kk].criterios[c]=e.target.value?parseInt(e.target.value):null;
        calcMedia(kk); atualizaStatus(kk); atualizaProgresso(); autosave();
      };
    });
    body.querySelector("textarea").oninput=e=>{ notas[e.target.dataset.k].obs=e.target.value; autosave(); };
    CRITERIOS.forEach(([id])=>{ const v=notas[k].criterios[id]; if(v) body.querySelector(`select[data-c="${id}"]`).value=v; });
    body.querySelector("textarea").value=notas[k].obs||"";
    calcMedia(k);
  }
  body.classList.remove("hide");
}

function calcMedia(k){
  const c=notas[k].criterios;
  const vals=CRITERIOS.map(([id])=>c[id]).filter(v=>v!=null);
  const box=$("media-"+k);
  if(vals.length===CRITERIOS.length){
    const m=vals.reduce((a,b)=>a+b,0)/vals.length;
    if(box) box.textContent=m.toFixed(2); notas[k].media=m;
  }else{
    if(box) box.textContent=vals.length?"("+vals.length+"/"+CRITERIOS.length+")":"—"; notas[k].media=null;
  }
}
function completo(k){ const c=notas[k].criterios; return CRITERIOS.every(([id])=>c[id]!=null); }
function atualizaStatus(k){
  const done=completo(k); const st=$("st-"+k), pid=$("pid-"+k);
  if(st) st.textContent=done?"✓ completo":""; if(pid) pid.classList.toggle("done",done);
}
function atualizaProgresso(){
  const lista=(DIAS[diaAtual]||{})[avaliadorAtual]||[];
  const total=lista.length, feitos=lista.filter(p=>completo(keyPoster(p))).length;
  $("lbl-prog").textContent=`${feitos} de ${total} pôsteres avaliados`;
  $("prog-fill").style.width=(total?feitos/total*100:0)+"%";
}

// ---------- MONTAR REGISTROS ----------
function montaRegistros(){
  const lista=(DIAS[diaAtual]||{})[avaliadorAtual]||[];
  const hoje=new Date().toLocaleDateString("pt-BR");
  return lista.map(p=>{
    const k=keyPoster(p), n=notas[k];
    const linha={dia:diaAtual, diaNome:NOMES_DIAS[diaAtual]||("Dia "+diaAtual),
      avaliador:avaliadorAtual.trim(), email:emailAtual, data:hoje,
      idPoster:p.idPoster, idOriginal:p.idOriginal, titulo:p.titulo,
      autorPrincipal:p.autores[0]||"", instituicao:p.instituicao};
    CRITERIOS.forEach(([id,nome])=>{ linha[nome]=n.criterios[id]??""; });
    linha["Média"]=n.media!=null?Number(n.media.toFixed(2)):"";
    linha["Obs."]=n.obs||"";
    return linha;
  });
}

// ---------- XLSX ----------
$("btn-xls").onclick=()=>{
  const regs=montaRegistros();
  const ws=XLSX.utils.json_to_sheet(regs), wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Avaliações");
  XLSX.writeFile(wb,"avaliacao_dia"+diaAtual+"_"+slug(avaliadorAtual)+".xlsx");
};

// ---------- ENVIO ----------
$("btn-enviar").onclick=async()=>{
  limpaMsg($("painel-msg"));
  const lista=(DIAS[diaAtual]||{})[avaliadorAtual]||[];
  const incompletos=lista.filter(p=>!completo(keyPoster(p)));
  if(incompletos.length){ if(!confirm(incompletos.length+" pôster(es) ainda estão incompletos. Enviar mesmo assim?")) return; }
  if(!fbOk){ msg($("painel-msg"),"Firebase não configurado. Baixe a planilha (.xlsx) e envie à coordenação.","info"); return; }
  $("btn-enviar").disabled=true;
  try{
    const regs=montaRegistros();
    await db.collection("avaliacoes").doc(docKey()).set({
      dia:diaAtual, diaNome:NOMES_DIAS[diaAtual]||("Dia "+diaAtual),
      avaliador:avaliadorAtual.trim(), email:emailAtual,
      enviadoEm:firebase.firestore.FieldValue.serverTimestamp(),
      totalPosteres:lista.length, avaliadosCompletos:lista.length-incompletos.length,
      avaliacoes:regs
    });
    msg($("painel-msg"),"✓ Avaliações do dia "+diaAtual+" enviadas à coordenação. Pode reabrir e reenviar quando quiser; o envio mais recente substitui o anterior.","ok");
  }catch(e){ console.error(e); msg($("painel-msg"),"Erro ao enviar: "+e.message+". Suas notas continuam salvas. Baixe a planilha (.xlsx) como alternativa.","err"); }
  $("btn-enviar").disabled=false;
};

$("btn-sair").onclick=()=>{
  if(confirm("Sair? Suas notas já estão salvas"+(fbOk?" na nuvem":" neste aparelho")+" e voltam quando você reabrir com o mesmo dia e nome.")){
    diaAtual=""; avaliadorAtual=""; notas={};
    $("tela-painel").classList.add("hide"); $("tela-login").classList.remove("hide");
    $("in-senha").value=""; limpaMsg($("painel-msg")); limpaMsg($("login-msg")); marcaSalvo("");
  }
};
</script>
